version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: warehouse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-warehouse123}
      MYSQL_DATABASE: device_warehouse
      MYSQL_USER: warehouse
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-warehouse123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - warehouse-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: warehouse-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: device_warehouse
      MYSQL_USER: warehouse
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-warehouse123}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: http://localhost:80
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - warehouse-network
    restart: unless-stopped

  # 前端服务 (Nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: warehouse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - warehouse-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  warehouse-network:
    driver: bridge
